{% extends "base.html" %}

{% block page_title %}Edit Member{% endblock %}

{% block content %}
<div class="form-container">
    <h5><i class="bi bi-pencil"></i> Edit Member</h5>
    <hr>
    
    <form method="POST">
        <div class="mb-3">
            <label class="form-label">Full Name</label>
            <input type="text" name="name" class="form-control" value="{{ member.name }}" required>
        </div>
        
        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control" value="{{ member.email }}" required>
        </div>
        
        <div class="mb-3">
            <label class="form-label">Phone</label>
            <input type="tel" name="phone" class="form-control" value="{{ member.phone or '' }}">
        </div>
        
        <div class="mb-3">
            <label class="form-label">Status</label>
            <select name="status" class="form-select">
                <option value="active" {% if member.status == 'active' %}selected{% endif %}>Active</option>
                <option value="inactive" {% if member.status == 'inactive' %}selected{% endif %}>Inactive</option>
            </select>
        </div>
        
        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary flex-grow-1">
                <i class="bi bi-check-circle"></i> Update Member
            </button>
            <a href="{{ url_for('members') }}" class="btn btn-secondary">
                <i class="bi bi-x-circle"></i> Cancel
            </a>
        </div>
    </form>
</div>
{% endblock %}
