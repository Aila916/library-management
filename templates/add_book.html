{% extends "base.html" %}

{% block page_title %}Add Book{% endblock %}

{% block content %}
<div class="form-container">
    <h5><i class="bi bi-plus-circle"></i> Add New Book</h5>
    <hr>
    
    <form method="POST">
        <div class="mb-3">
            <label class="form-label">Book Title</label>
            <input type="text" name="title" class="form-control" placeholder="Enter book title" required>
        </div>
        
        <div class="mb-3">
            <label class="form-label">Author</label>
            <input type="text" name="author" class="form-control" placeholder="Enter author name" required>
        </div>
        
        <div class="mb-3">
            <label class="form-label">Quantity</label>
            <input type="number" name="quantity" class="form-control" placeholder="Enter quantity" value="1" min="1" required>
        </div>
        
        <button type="submit" class="btn btn-primary w-100">
            <i class="bi bi-check-circle"></i> Add Book
        </button>
    </form>
</div>
{% endblock %}
